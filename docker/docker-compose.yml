services:
  postgres:
    image: postgres:15
    container_name: avatars-postgres
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: avatars
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d avatars"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: avatars-rabbit
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    container_name: avatars-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  createbuckets:
    image: minio/mc
    container_name: avatars-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb local/avatars || true &&
      mc policy set public local/avatars &&
      exit 0;
      "

  migrate:
    image: migrate/migrate
    container_name: avatars-migrate
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../migrations:/migrations
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "
      sleep 3 &&
      migrate
      -path /migrations
      -database postgres://user:password@postgres:5432/avatars?sslmode=disable
      up
      "

  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: avatars-server
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      DB_URL: postgres://user:password@postgres:5432/avatars?sslmode=disable
      S3_ENDPOINT: minio:9000
      S3_KEY: minioadmin
      S3_SECRET: minioadmin
      S3_BUCKET: avatars
      RABBIT_URL: amqp://guest:guest@rabbitmq:5672/

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: avatars-worker
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
    command: ["./worker"]
    environment:
      DB_URL: postgres://user:password@postgres:5432/avatars?sslmode=disable
      S3_ENDPOINT: minio:9000
      S3_KEY: minioadmin
      S3_SECRET: minioadmin
      S3_BUCKET: avatars
      RABBIT_URL: amqp://guest:guest@rabbitmq:5672/

volumes:
  pg_data:
  minio_data:

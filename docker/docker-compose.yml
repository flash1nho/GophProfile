services:
  postgres:
    image: postgres:15
    container_name: avatars-postgres
    restart: always
    environment:
      POSTGRES_USER: gophprofile
      POSTGRES_PASSWORD: gophprofile
      POSTGRES_DB: avatars
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gophprofile -d avatars"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: avatars-rabbit
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    container_name: avatars-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  createbuckets:
    image: minio/mc
    container_name: avatars-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb local/avatars || true &&
      mc anonymous set public local/avatars &&
      exit 0;
      "

  migrate:
    image: migrate/migrate:v4.17.0
    container_name: avatars-migrate
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../migrations:/migrations
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "
      sleep 5 &&
      migrate
      -path /migrations
      -database postgres://gophprofile:gophprofile@postgres:5432/avatars?sslmode=disable
      up
      "

  otel-collector:
    image: otel/opentelemetry-collector:0.102.0
    container_name: avatars-otel
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ../deploy/otel-collector.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4318:4318"
    depends_on:
      jaeger:
        condition: service_healthy

  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: avatars-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
      otel-collector:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      DB_URL: postgres://gophprofile:gophprofile@postgres:5432/avatars?sslmode=disable
      S3_ENDPOINT: minio:9000
      S3_KEY: minioadmin
      S3_SECRET: minioadmin
      S3_BUCKET: avatars
      RABBIT_URL: amqp://guest:guest@rabbitmq:5672/
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - ../logs:/logs

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: avatars-worker
    restart: unless-stopped
    command: ["./worker"]
    depends_on:
      server:
        condition: service_healthy
      otel-collector:
        condition: service_started
    environment:
      DB_URL: postgres://gophprofile:gophprofile@postgres:5432/avatars?sslmode=disable
      S3_ENDPOINT: minio:9000
      S3_KEY: minioadmin
      S3_SECRET: minioadmin
      S3_BUCKET: avatars
      RABBIT_URL: amqp://guest:guest@rabbitmq:5672/
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    volumes:
      - ../logs:/logs

  jaeger:
    image: jaegertracing/all-in-one:1.54
    container_name: avatars-jaeger
    ports:
      - "16686:16686"
      - "14250:14250"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:16686 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus
    container_name: avatars-prometheus
    volumes:
      - ../deploy/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9090/-/ready || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana
    container_name: avatars-grafana
    ports:
      - "3000:3000"
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy

  loki:
    image: grafana/loki:2.9.3
    container_name: avatars-loki
    ports:
      - "3100:3100"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  promtail:
    image: grafana/promtail:2.9.3
    container_name: avatars-promtail
    volumes:
      - ../logs:/logs
      - ../deploy/promtail.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml

volumes:
  pg_data:
  minio_data:

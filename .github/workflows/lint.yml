name: Lint and Code Quality

on:
  push:
    branches: [ main, sprint* ]
  pull_request:
    branches: [ main, sprint* ]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.25.1'

    - name: Install & run golangci-lint
      run: |
        go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
        "$(go env GOPATH)/bin/golangci-lint" run --out-format=colored-line-number --timeout=5m

    - name: Run go fmt
      run: go fmt ./...

    - name: Run go vet
      run: go vet ./...
